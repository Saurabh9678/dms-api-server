$kind: http-request
order: 4000
method: PATCH
url: '{{base_url}}/api/v1/vehicle/1'
description: 'Partially update core vehicle fields (registration_number is immutable). Requires showroom membership. Returns 422 if vehicle is sold.'
headers:
  - key: Content-Type
    value: application/json
  - key: X-Platform
    value: web
    description: 'Required: web | ios_mobile | android_mobile | desktop'
  - key: X-Device-Id
    value: device-001
    description: 'Required: non-empty device identifier'
  - key: Authorization
    value: 'Bearer {{access_token}}'
    description: 'Required: JWT access token'
body:
  type: json
  content: |-
    {
      "manufacturer": "Honda",
      "model": "City",
      "color": "White",
      "usage_km": 35000,
      "fuel_type": "petrol",
      "transmission_type": "manual"
    }
