$kind: http-request
order: 5000
method: PATCH
url: '{{base_url}}/api/v1/vehicle/1/pricing'
description: 'Create or update vehicle pricing. If no pricing record exists, buying_price and buying_date are required. Requires showroom membership. Returns 422 if vehicle is sold.'
headers:
  - key: Content-Type
    value: application/json
  - key: X-Platform
    value: web
    description: 'Required: web | ios_mobile | android_mobile | desktop'
  - key: X-Device-Id
    value: device-001
    description: 'Required: non-empty device identifier'
  - key: Authorization
    value: 'Bearer {{access_token}}'
    description: 'Required: JWT access token'
body:
  type: json
  content: |-
    {
      "buying_price": 200000,
      "buying_date": "2023-01-10",
      "price_tag": 350000,
      "tagged_at": "2023-06-01T08:00:00Z",
      "currency": "inr",
      "remarks": "Good condition"
    }
