$kind: http-request
name: Public-Showroom-Vehicle-Listing
queryParams:
  showroom_id: "1"
  page: "1"
  limit: "20"
  sort_by: price_asc
order: 3000
method: GET
url: "{{base_url}}/api/v1/vehicle/public-listing?showroom_id=1&page=1&limit=20&sort_by=price_asc"
description: Public endpoint — no auth required. Returns ready_for_sale vehicles in a specific showroom grouped by type (cars/bikes/scooties). Includes price_tag only (no buying details). Supports type filter, price range filter, sort by price, and pagination.
headers:
  - key: X-Platform
    value: web
    description: "Required: web | ios_mobile | android_mobile | desktop"
  - key: X-Device-Id
    value: device-001
    description: "Required: non-empty device identifier"
params:
  - key: showroom_id
    value: '1'
    description: 'Required: showroom ID to scope the listing'
  - key: type
    value: ''
    description: 'Filter by vehicle type (repeatable). Values: car, bike, scooty. Default: all'
    disabled: true
  - key: min_price
    value: ''
    description: Minimum price_tag filter
    disabled: true
  - key: max_price
    value: ''
    description: Maximum price_tag filter
    disabled: true
  - key: sort_by
    value: price_asc
    description: 'Sort order. Values: price_asc, price_desc. Default: price_asc'
  - key: page
    value: '1'
    description: 'Page number (min 1)'
  - key: limit
    value: '20'
    description: 'Items per page (1–100)'
