$kind: http-example
name: 'Invalid Request'
order: 2000
request:
  url: '{{base_url}}/api/v1/auth/refresh-token'
  method: POST
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": {
          "code": "INVALID_REQUEST",
          "message": "invalid request"
        }
      }
