$kind: http-example
name: 'Invalid Access Token'
order: 4000
request:
  url: '{{base_url}}/api/v1/auth/logout'
  method: POST
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": {
          "code": "INVALID_ACCESS_TOKEN",
          "message": "Invalid access token"
        }
      }
