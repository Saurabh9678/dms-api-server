$kind: http-request
order: 5000
method: POST
url: '{{base_url}}/api/v1/auth/logout'
description: 'Auth: Access token, X-Platform, and X-Device-Id headers required. Revokes active sessions for the authenticated user only on the requested platform.'
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{access_token}}'
  - key: X-Platform
    value: web
  - key: X-Device-Id
    value: browser-1
examples: './.resources/Logout.resources/examples'
