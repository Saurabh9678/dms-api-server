$kind: http-request
order: 4000
name: 'Refresh Token'
method: POST
url: '{{base_url}}/api/v1/auth/refresh-token'
description: 'Auth: Public (refresh token based). Rotates token pair.'
headers:
  - key: Content-Type
    value: application/json
  - key: X-Platform
    value: web
  - key: X-Device-Id
    value: browser-1
body:
  type: json
  content: |-
    {
      "refreshToken": "..."
    }
examples: './.resources/Refresh-Token.resources/examples'
