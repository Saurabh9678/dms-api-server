$kind: http-request
order: 3000
name: 'Verify OTP'
method: POST
url: '{{base_url}}/api/v1/auth/verify-otp'
description: 'Auth: Public. Verifies OTP and returns token pair.'
headers:
  - key: Content-Type
    value: application/json
  - key: X-Platform
    value: web
  - key: X-Device-Id
    value: browser-1
body:
  type: json
  content: |-
    {
      "requestId": "Ab12Cd34",
      "otpCode": "123456"
    }
examples: './.resources/Verify-OTP.resources/examples'
