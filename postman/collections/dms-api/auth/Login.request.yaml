$kind: http-request
order: 2000
method: POST
url: '{{base_url}}/api/v1/auth/login'
description: 'Auth: Public. Triggers OTP for existing user login.'
headers:
  - key: Content-Type
    value: application/json
  - key: X-Platform
    value: web
  - key: X-Device-Id
    value: browser-1
body:
  type: json
  content: |-
    {
      "countryCode": "+91",
      "phoneNumber": "9999999999"
    }
examples: './.resources/Login.resources/examples'
