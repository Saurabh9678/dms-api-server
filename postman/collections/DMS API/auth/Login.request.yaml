$kind: http-request
description: "Auth: Public. Triggers OTP for existing user login."
url: "{{base_url}}/api/v1/auth/login"
method: POST
headers:
  Content-Type: application/json
  X-Platform: web
  X-Device-Id: browser-1
body:
  type: text
  content: |-
    {
      "countryCode": "+91",
      "phoneNumber": "9999999999"
    }
examples: ./.resources/Login.resources/examples
order: 3000
