$kind: http-example
request:
  url: "{{base_url}}/api/v1/auth/send-otp"
  method: POST
  headers:
    Content-Type: application/json
    X-Platform: web
    X-Device-Id: browser-1
  body:
    type: text
    content: |-
      {
        "countryCode": "+91",
        "phoneNumber": "9999999999"
      }
response:
  statusCode: 429
  statusText: Too Many Requests
  body:
    type: text
    content: |-
      {
        "success": false,
        "error": {
          "code": "OTP_COOLDOWN",
          "message": "please wait before requesting another OTP"
        }
      }
order: 2000
