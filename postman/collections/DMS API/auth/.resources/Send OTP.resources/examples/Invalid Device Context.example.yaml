$kind: http-example
request:
  url: "{{base_url}}/api/v1/auth/send-otp"
  method: POST
  headers:
    Content-Type: application/json
    X-Platform: web
    X-Device-Id: browser-1
  body:
    type: text
    content: |-
      {
        "countryCode": "+91",
        "phoneNumber": "9999999999"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: |-
      {
        "success": false,
        "error": {
          "code": "INVALID_DEVICE_CONTEXT",
          "message": "invalid request"
        }
      }
order: 5000
