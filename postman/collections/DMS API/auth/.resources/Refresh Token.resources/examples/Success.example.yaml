$kind: http-example
request:
  url: "{{base_url}}/api/v1/auth/refresh-token"
  method: POST
  headers:
    Content-Type: application/json
    X-Platform: web
    X-Device-Id: browser-1
  body:
    type: text
    content: |-
      {
        "refreshToken": "..."
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Token refreshed successfully",
        "data": {
          "accessToken": "...",
          "refreshToken": "...",
          "expiresIn": 3600,
          "tokenType": "Bearer"
        }
      }
order: 1000
