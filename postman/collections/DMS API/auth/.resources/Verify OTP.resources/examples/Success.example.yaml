$kind: http-example
request:
  url: "{{base_url}}/api/v1/auth/verify-otp"
  method: POST
  headers:
    Content-Type: application/json
    X-Platform: web
    X-Device-Id: browser-1
  body:
    type: text
    content: |-
      {
        "requestId": "Ab12Cd34",
        "otpCode": "123456"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "OTP verified successfully",
        "data": {
          "accessToken": "...",
          "refreshToken": "...",
          "expiresIn": 3600,
          "tokenType": "Bearer",
          "required_name": true
        }
      }
order: 1000
