$kind: http-example
request:
  url: "{{base_url}}/api/v1/auth/logout"
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{access_token}}
    X-Platform: web
    X-Device-Id: browser-1
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "Logged out successfully"
      }
order: 1000
