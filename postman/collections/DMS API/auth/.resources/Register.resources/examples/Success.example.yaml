$kind: http-example
request:
  url: "{{base_url}}/api/v1/auth/register"
  method: POST
  headers:
    Content-Type: application/json
    X-Platform: web
    X-Device-Id: browser-1
  body:
    type: text
    content: |-
      {
        "countryCode": "+91",
        "phoneNumber": "9999999999"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "OTP sent successfully",
        "data": {
          "message": "If the account is valid, an OTP has been sent",
          "requestId": "Ab12Cd34"
        }
      }
order: 1000
