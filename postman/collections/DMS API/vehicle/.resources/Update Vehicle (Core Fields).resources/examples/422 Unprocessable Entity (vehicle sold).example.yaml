$kind: http-example
request:
  url: "{{base_url}}/api/v1/vehicle/1"
  method: PATCH
  headers:
    Content-Type: application/json
    X-Platform: web
    X-Device-Id: device-001
    Authorization: Bearer {{access_token}}
  body:
    type: text
    content: |-
      {
        "manufacturer": "Honda",
        "model": "City",
        "color": "White",
        "usage_km": 35000,
        "fuel_type": "petrol",
        "transmission_type": "manual"
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity
  body:
    type: text
    content: |-
      {
        "success": false,
        "error": {
          "code": "VEHICLE_UPDATE_FORBIDDEN",
          "message": "vehicle is sold"
        }
      }
order: 3000
