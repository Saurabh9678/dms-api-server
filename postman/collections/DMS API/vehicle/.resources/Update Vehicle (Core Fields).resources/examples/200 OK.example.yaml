$kind: http-example
request:
  url: "{{base_url}}/api/v1/vehicle/1"
  method: PATCH
  headers:
    Content-Type: application/json
    X-Platform: web
    X-Device-Id: device-001
    Authorization: Bearer {{access_token}}
  body:
    type: text
    content: |-
      {
        "manufacturer": "Honda",
        "model": "City",
        "color": "White",
        "usage_km": 35000,
        "fuel_type": "petrol",
        "transmission_type": "manual"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "vehicle updated",
        "data": {
          "id": 1,
          "vehicle_type": "car",
          "manufacturer": "Honda",
          "model": "City",
          "variant": "V",
          "color": "White",
          "year_of_manufacture": 2021,
          "rto_code": "KA-01",
          "registration_number": "KA01AB1234",
          "registration_state": "Karnataka",
          "usage_km": 35000,
          "fuel_type": "petrol",
          "transmission_type": "manual",
          "updated_at": "2024-06-01T10:00:00Z"
        }
      }
order: 1000
