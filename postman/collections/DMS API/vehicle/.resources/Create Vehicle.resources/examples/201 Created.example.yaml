$kind: http-example
request:
  url: "{{base_url}}/api/v1/vehicle"
  method: POST
  headers:
    Content-Type: application/json
    X-Platform: web
    X-Device-Id: device-001
    Authorization: Bearer {{access_token}}
  body:
    type: text
    content: |-
      {
        "vehicle_type": "car",
        "manufacturer": "Toyota",
        "model": "Camry",
        "variant": "LE",
        "color": "Black",
        "year_of_manufacture": 2020,
        "rto_code": "KA-01",
        "registration_number": "KA01AB1234",
        "registration_state": "Karnataka",
        "usage_km": 50000,
        "fuel_type": "petrol",
        "transmission_type": "manual"
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "vehicle created",
        "data": {
          "id": 1,
          "vehicle_type": "car",
          "manufacturer": "Toyota",
          "model": "Camry",
          "variant": "LE",
          "color": "Black",
          "year_of_manufacture": 2020,
          "rto_code": "KA-01",
          "registration_number": "KA01AB1234",
          "registration_state": "Karnataka",
          "usage_km": 50000,
          "fuel_type": "petrol",
          "transmission_type": "manual",
          "created_at": "2024-01-01T00:00:00Z",
          "updated_at": "2024-01-01T00:00:00Z"
        }
      }
order: 1000
