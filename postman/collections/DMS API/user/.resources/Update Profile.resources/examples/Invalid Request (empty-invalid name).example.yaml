$kind: http-example
request:
  url: "{{base_url}}/api/v1/user/me"
  method: PATCH
  headers:
    Content-Type: application/json
    Authorization: Bearer {{access_token}}
    X-Platform: web
    X-Device-Id: browser-1
  body:
    type: text
    content: |-
      {
        "name": "John Doe"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: |-
      {
        "success": false,
        "error": {
          "code": "INVALID_REQUEST",
          "message": "invalid request"
        }
      }
order: 2000
