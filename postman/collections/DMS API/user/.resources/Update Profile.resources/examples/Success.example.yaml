$kind: http-example
request:
  url: "{{base_url}}/api/v1/user/me"
  method: PATCH
  headers:
    Content-Type: application/json
    Authorization: Bearer {{access_token}}
    X-Platform: web
    X-Device-Id: browser-1
  body:
    type: text
    content: |-
      {
        "name": "John Doe"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "success": true,
        "message": "profile updated",
        "data": {
          "name": "John Doe"
        }
      }
order: 1000
