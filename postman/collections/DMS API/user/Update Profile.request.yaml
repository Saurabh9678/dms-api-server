$kind: http-request
description: "User: Protected endpoint (requires Bearer token). Updates authenticated user's profile name. Name must be non-empty after trim and contain only letters, spaces, hyphens, and apostrophes."
url: "{{base_url}}/api/v1/user/me"
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{access_token}}
  X-Platform: web
  X-Device-Id: browser-1
body:
  type: text
  content: |-
    {
      "name": "John Doe"
    }
examples: ./.resources/Update Profile.resources/examples
order: 1000
