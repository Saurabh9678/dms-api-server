$kind: http-example
request:
  url: "{{base_url}}/api/v1/dashboard?duration=1m"
  method: GET
  headers:
    Authorization: Bearer {{access_token}}
    X-Platform: web
    X-Device-Id: {{device_id}}
response:
  statusCode: 401
  statusText: Unauthorized
  body:
    type: text
    content: |-
      {
        "success": false,
        "error": {
          "code": "INVALID_ACCESS_TOKEN",
          "message": "invalid request"
        }
      }
order: 4000
