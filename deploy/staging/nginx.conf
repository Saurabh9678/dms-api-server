server {
    listen 80;
    listen [::]:80;
    server_name stag-api.infiniour.com;

    access_log /var/log/nginx/stag-api-access.log;
    error_log  /var/log/nginx/stag-api-error.log warn;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Upload size limit
    client_max_body_size 50M;

    # Certbot will insert the ACME challenge block and HTTPS redirect here.
    # Run: sudo certbot --nginx -d stag-api.infiniour.com

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        client_max_body_size        50M;
        proxy_request_buffering     off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
    }
}
